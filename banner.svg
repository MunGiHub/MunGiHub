<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="400" viewBox="0 0 1500 400">
  <defs>
    <!-- Pastel gray gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C8CDD6"/>
      <stop offset="45%"  stop-color="#D4D8E0"/>
      <stop offset="100%" stop-color="#BEC4CE"/>
    </linearGradient>

    <!-- Soft warm overlay -->
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8ECF2" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#F0F2F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#DDE2EA" stop-opacity="0.3"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#8A909C" flood-opacity="0.35"/>
    </filter>
    <clipPath id="clip">
      <rect width="1500" height="400" rx="20"/>
    </clipPath>
  </defs>

  <style>
    @keyframes nodePulse   { 0%,100%{r:10;opacity:.65} 50%{r:14;opacity:.95} }
    @keyframes nodePulseS  { 0%,100%{r:6;opacity:.5}  50%{r:8;opacity:.9}  }
    @keyframes nodePulseSS { 0%,100%{r:3.5;opacity:.35} 50%{r:5;opacity:.75} }
    @keyframes floatUp     { 0%,100%{transform:translateY(0px)}  50%{transform:translateY(-13px)} }
    @keyframes floatDown   { 0%,100%{transform:translateY(0px)}  50%{transform:translateY(11px)}  }
    @keyframes drawLine    { from{stroke-dashoffset:500;opacity:0} to{stroke-dashoffset:0;opacity:1} }
    @keyframes dash        { from{stroke-dashoffset:200} to{stroke-dashoffset:0}   }
    @keyframes dashRev     { from{stroke-dashoffset:0}   to{stroke-dashoffset:200} }
    @keyframes titleIn     { from{opacity:0;transform:translateY(22px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes subIn       { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes twinkle     { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1.4)} }
    @keyframes shimmer     { 0%{transform:translateX(-300px);opacity:0} 20%{opacity:.45} 80%{opacity:.45} 100%{transform:translateX(1800px);opacity:0} }

    .cl  { animation: floatUp   6s ease-in-out infinite; }
    .cr  { animation: floatDown 7.5s ease-in-out infinite; }

    .na  { animation: nodePulse   3s ease-in-out infinite; }
    .nb  { animation: nodePulseS  4s ease-in-out .6s infinite; }
    .nc  { animation: nodePulseSS 2.8s ease-in-out 1.1s infinite; }
    .na2 { animation: nodePulse   3.5s ease-in-out .3s infinite; }
    .nb2 { animation: nodePulseS  4.5s ease-in-out 1s infinite; }

    .ld1 { stroke-dasharray:500; animation: drawLine 2s ease-out .2s both; }
    .ld2 { stroke-dasharray:500; animation: drawLine 2s ease-out .5s both; }
    .ld3 { stroke-dasharray:500; animation: drawLine 2s ease-out .8s both; }
    .ld4 { stroke-dasharray:500; animation: drawLine 2s ease-out .35s both; }
    .ld5 { stroke-dasharray:500; animation: drawLine 2s ease-out .65s both; }
    .ld6 { stroke-dasharray:500; animation: drawLine 2s ease-out 1s both; }

    .m1  { stroke-dasharray:10 7; animation: dash    3.5s linear infinite; }
    .m2  { stroke-dasharray:10 7; animation: dashRev 4.5s linear infinite; }
    .m3  { stroke-dasharray: 8 9; animation: dash    5.5s linear infinite; }

    .tt  { animation: titleIn .95s cubic-bezier(.22,1,.36,1) .15s both; }
    .st  { animation: subIn   .95s cubic-bezier(.22,1,.36,1) .65s both; }

    .s1{animation:twinkle 2.3s ease-in-out infinite;}
    .s2{animation:twinkle 3.0s ease-in-out .7s infinite;}
    .s3{animation:twinkle 2.7s ease-in-out 1.4s infinite;}
    .s4{animation:twinkle 3.6s ease-in-out .3s infinite;}
    .s5{animation:twinkle 2.1s ease-in-out 1.9s infinite;}

    .shim { animation: shimmer 5.5s ease-in-out 1.8s infinite; }
  </style>

  <!-- BG -->
  <rect width="1500" height="400" rx="20" fill="url(#bg)"/>
  <rect width="1500" height="400" rx="20" fill="url(#overlay)"/>

  <!-- Shimmer -->
  <g clip-path="url(#clip)">
    <rect class="shim" x="0" y="0" width="200" height="400"
          fill="white" fill-opacity="0.2" style="filter:blur(22px);"/>
  </g>

  <!-- LEFT CLUSTER -->
  <g class="cl" clip-path="url(#clip)">
    <line class="ld1" x1="55"  y1="75"  x2="210" y2="155" stroke="#A8B0BC" stroke-width="1.6" stroke-opacity=".7"/>
    <line class="ld2" x1="210" y1="155" x2="135" y2="275" stroke="#A8B0BC" stroke-width="1.6" stroke-opacity=".7"/>
    <line class="ld3" x1="135" y1="275" x2="300" y2="310" stroke="#A8B0BC" stroke-width="1.4" stroke-opacity=".6"/>
    <line class="ld1" x1="210" y1="155" x2="320" y2="125" stroke="#A8B0BC" stroke-width="1.2" stroke-opacity=".45"/>
    <line class="ld2" x1="55"  y1="75"  x2="135" y2="275" stroke="#A8B0BC" stroke-width="1"   stroke-opacity=".28"/>
    <line class="ld3" x1="300" y1="310" x2="380" y2="270" stroke="#A8B0BC" stroke-width="1"   stroke-opacity=".32"/>
    <line class="m1"  x1="55"  y1="75"  x2="210" y2="155" stroke="#E0E4EA" stroke-width="1.1" stroke-opacity=".6"/>
    <line class="m2"  x1="135" y1="275" x2="300" y2="310" stroke="#E0E4EA" stroke-width="1"   stroke-opacity=".5"/>
    <polyline points="18,18 18,85 85,85" fill="none" stroke="#A0AABB" stroke-width="1.8" stroke-opacity=".5"/>
    <line x1="110" y1="18" x2="170" y2="18" stroke="#A0AABB" stroke-width="1.2" stroke-opacity=".38"/>
    <line x1="18"  y1="115" x2="18" y2="148" stroke="#A0AABB" stroke-width="1"   stroke-opacity=".28"/>
    <circle cx="160" cy="105" r="2.5" fill="#C8D0DC" fill-opacity=".55"/>
    <circle cx="90"  cy="180" r="2"   fill="#C8D0DC" fill-opacity=".45"/>
    <circle class="na"  cx="210" cy="155" r="10" fill="#E8ECF2" fill-opacity=".88" filter="url(#glow)"/>
    <circle class="nb"  cx="135" cy="275" r="7"  fill="#DDE2EA" fill-opacity=".82" filter="url(#glow)"/>
    <circle class="nc"  cx="300" cy="310" r="4.5" fill="#D4DAE4" fill-opacity=".72"/>
    <circle class="na2" cx="55"  cy="75"  r="8"  fill="#E4E8EE" fill-opacity=".82" filter="url(#glow)"/>
    <circle class="nc"  cx="320" cy="125" r="4"  fill="#DDE2EA" fill-opacity=".65"/>
    <circle class="nc"  cx="380" cy="270" r="3.5" fill="#E0E5EB" fill-opacity=".6"/>
  </g>

  <!-- RIGHT CLUSTER -->
  <g class="cr" clip-path="url(#clip)">
    <line class="ld4" x1="1445" y1="55"  x2="1295" y2="165" stroke="#B0B8C4" stroke-width="1.6" stroke-opacity=".7"/>
    <line class="ld5" x1="1295" y1="165" x2="1385" y2="290" stroke="#B0B8C4" stroke-width="1.6" stroke-opacity=".7"/>
    <line class="ld6" x1="1295" y1="165" x2="1150" y2="210" stroke="#B0B8C4" stroke-width="1.4" stroke-opacity=".6"/>
    <line class="ld4" x1="1150" y1="210" x2="1225" y2="335" stroke="#B0B8C4" stroke-width="1.2" stroke-opacity=".5"/>
    <line class="ld5" x1="1385" y1="290" x2="1225" y2="335" stroke="#B0B8C4" stroke-width="1.2" stroke-opacity=".45"/>
    <line class="ld6" x1="1445" y1="55"  x2="1150" y2="210" stroke="#B0B8C4" stroke-width="1"   stroke-opacity=".26"/>
    <line class="m3"  x1="1445" y1="55"  x2="1295" y2="165" stroke="#E0E4EA" stroke-width="1.1" stroke-opacity=".55"/>
    <line class="m1"  x1="1150" y1="210" x2="1225" y2="335" stroke="#E0E4EA" stroke-width="1"   stroke-opacity=".48"/>
    <polyline points="1482,18 1482,85 1415,85" fill="none" stroke="#A8B2BE" stroke-width="1.8" stroke-opacity=".5"/>
    <line x1="1340" y1="18" x2="1395" y2="18" stroke="#A8B2BE" stroke-width="1.2" stroke-opacity=".38"/>
    <ellipse cx="1360" cy="368" rx="90" ry="38" fill="#D8DDE6" fill-opacity=".2"/>
    <circle cx="1430" cy="190" r="2.5" fill="#CDD3DC" fill-opacity=".55"/>
    <circle cx="1340" cy="255" r="2"   fill="#CDD3DC" fill-opacity=".45"/>
    <circle class="na2" cx="1295" cy="165" r="13" fill="#ECF0F5" fill-opacity=".88" filter="url(#glow)"/>
    <circle class="nb"  cx="1445" cy="55"  r="8"  fill="#E4E9F0" fill-opacity=".82" filter="url(#glow)"/>
    <circle class="nb2" cx="1150" cy="210" r="9"  fill="#E8ECF2" fill-opacity=".82" filter="url(#glow)"/>
    <circle class="nc"  cx="1385" cy="290" r="5.5" fill="#DDE2EA" fill-opacity=".72"/>
    <circle class="nc"  cx="1225" cy="335" r="4.5" fill="#D8DDE6" fill-opacity=".65"/>
    <circle class="nc"  cx="1420" cy="180" r="3"   fill="#E4E8EE" fill-opacity=".6"/>
  </g>

  <!-- SPARKLES -->
  <g fill="white" clip-path="url(#clip)">
    <g class="s1" transform="translate(430,48)">
      <polygon points="0,-8 1.6,-1.6 8,0 1.6,1.6 0,8 -1.6,1.6 -8,0 -1.6,-1.6" fill-opacity=".7"/>
    </g>
    <g class="s2" transform="translate(1070,42)">
      <polygon points="0,-7 1.4,-1.4 7,0 1.4,1.4 0,7 -1.4,1.4 -7,0 -1.4,-1.4" fill-opacity=".6"/>
    </g>
    <g class="s3" transform="translate(720,348)">
      <polygon points="0,-6 1.2,-1.2 6,0 1.2,1.2 0,6 -1.2,1.2 -6,0 -1.2,-1.2" fill-opacity=".55"/>
    </g>
    <g class="s4" transform="translate(360,318)">
      <polygon points="0,-5 1,-1 5,0 1,1 0,5 -1,1 -5,0 -1,-1" fill-opacity=".5"/>
    </g>
    <g class="s5" transform="translate(1145,348)">
      <polygon points="0,-5 1,-1 5,0 1,1 0,5 -1,1 -5,0 -1,-1" fill-opacity=".5"/>
    </g>
    <circle class="s1" cx="560"  cy="28"  r="2.8" fill-opacity=".55"/>
    <circle class="s3" cx="960"  cy="22"  r="2.2" fill-opacity=".48"/>
    <circle class="s2" cx="210"  cy="365" r="2.2" fill-opacity=".42"/>
    <circle class="s4" cx="1310" cy="368" r="2.8" fill-opacity=".48"/>
    <circle class="s5" cx="750"  cy="18"  r="2"   fill-opacity=".42"/>
  </g>

  <!-- TITLE -->
  <text class="tt"
    x="750" y="215"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="100"
    font-weight="800"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="5"
    filter="url(#textShadow)"
  >Mun Gi Jeon</text>

  <!-- SUBTITLE -->
  <text class="st"
    x="750" y="285"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="27"
    font-weight="400"
    fill="#F4F6F8"
    fill-opacity=".93"
    text-anchor="middle"
    letter-spacing="1.2"
  >Undergraduate Researcher | NLP · RAG · Information Extraction</text>

</svg>
